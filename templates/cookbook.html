<!DOCTYPE html>
<html>
<head>
    <title>My Cookbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            font-family: 'Segoe UI';
        }

        .glass-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .recipe-card {
            border-radius: 18px;
            overflow: hidden;
            transition: 0.4s;
        }

        .recipe-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .recipe-img {
            height: 200px;
            object-fit: cover;
        }

        .btn-remove {
            border-radius: 12px;
            font-weight: 600;
        }

        .title {
            font-weight: 800;
            background: linear-gradient(45deg, #11998e, #38ef7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="p-4">

<div class="container glass-card">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="title">❤️ My Saved Recipes</h2>
        <a href="/" class="btn btn-dark">⬅ Back</a>
    </div>

    <div class="row">
        {% if recipes %}
            {% for recipe in recipes %}
            <div class="col-md-4 mb-4">
                <div class="card recipe-card">

                    {% if recipe.image %}
                        <img src="{{ recipe.image }}" class="recipe-img w-100">
                    {% endif %}

                    <div class="card-body">
                        <h5 class="fw-bold">{{ recipe.recipe_name }}</h5>
                        <p class="text-muted small">
                            {{ recipe.ingredients[:100] }}...
                        </p>

                        <button class="btn btn-danger w-100 btn-remove"
                            onclick="deleteRecipe({{ recipe.id }})">
                            🗑 Remove
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="text-center mt-5">
                <h4>No recipes saved yet 😢</h4>
                <p class="text-muted">Go find some delicious recipes!</p>
            </div>
        {% endif %}
    </div>

</div>

<script>
function deleteRecipe(id) {
    if (!confirm("Remove this recipe?")) return;

    fetch(`/delete_recipe/${id}`, {
        method: 'POST'
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        location.reload();
    })
    .catch(err => {
        console.error(err);
        alert("Error deleting ❌");
    });
}
</script>

</body>
</html>
