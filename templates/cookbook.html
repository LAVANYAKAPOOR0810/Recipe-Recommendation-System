<!DOCTYPE html>
<html>
<head>
    <title>My Cookbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<h2>❤️ My Saved Recipes</h2>

<div id="cookbook" class="row"></div>

<script>
let recipes = JSON.parse(localStorage.getItem("cookbook")) || [];

let container = document.getElementById("cookbook");

if (recipes.length === 0) {
    container.innerHTML = "<p>No saved recipes yet.</p>";
}

recipes.forEach(r => {
    container.innerHTML += `
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="${r.image}" class="card-img-top">
                <div class="card-body">
                    <h5>${r.name}</h5>
                    <p>${r.ingredients.substring(0,100)}...</p>
                </div>
            </div>
        </div>
    `;
});
</script>

</body>
</html>
