<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoChef - AI Recipe Genius</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
        }

        /* Animated cooking background */
        .cooking-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .cooking-bg video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(10,10,10,0.4) 0%, 
                rgba(26,26,44,0.5) 30%, 
                rgba(52,52,104,0.3) 70%,
                rgba(15,15,35,0.6) 100%);
            z-index: 2;
        }

        /* Floating ingredients - ENHANCED */
        .floating-ingredients {
            position: fixed;
            font-size: 2.8rem;
            opacity: 0.1;
            z-index: 3;
            animation: floatFood 30s infinite ease-in-out;
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
            text-shadow: 0 0 10px rgba(255,255,255,0.05);
        }

        .float1 { top: 10%; left: 8%; animation-delay: 0s; }
        .float2 { top: 20%; right: 10%; animation-delay: 7s; }
        .float3 { bottom: 30%; left: 5%; animation-delay: 14s; }
        .float4 { top: 70%; right: 12%; animation-delay: 21s; }

        @keyframes floatFood {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); opacity: 0.1; }
            25% { transform: translateY(-40px) rotate(90deg) scale(1.15); opacity: 0.15; }
            50% { transform: translateY(-80px) rotate(180deg) scale(1.3); opacity: 0.2; }
            75% { transform: translateY(-40px) rotate(270deg) scale(1.15); opacity: 0.15; }
        }

        /* Main container - MOVED SIGNIFICANTLY UPWARD */
        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 2.5rem 8rem 3rem; /* 🔥 MOVED UP - less top padding */
        }

        .login-card {
            background: rgba(15, 15, 25, 0.75); /* More transparent to blend with bg */
            backdrop-filter: blur(20px) saturate(1.2); /* Enhanced blur */
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            max-width: 520px;
            width: 100%;
            padding: 3rem 3rem 2.5rem 3rem;
            height: 580px; /* Slightly taller */
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 
                0 35px 80px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,255,255,0.05),
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            /* ✨ Subtle background video bleed-through */
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255,100,100,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(100,200,255,0.03) 0%, transparent 50%);
        }

        /* Enhanced card glow effect */
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            background: 
                radial-gradient(circle at 30% 30%, rgba(59,130,246,0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(255,107,107,0.1) 0%, transparent 50%);
            pointer-events: none;
            opacity: 0.7;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
            flex-shrink: 0;
        }

        .ai-brain {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #1e3a8a, #3b82f6, #1d4ed8);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            position: relative;
            box-shadow: 
                0 25px 50px rgba(59, 130, 246, 0.4),
                0 0 0 1px rgba(255,255,255,0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .ai-brain i {
            font-size: 3.5rem;
            color: white;
            z-index: 2;
            position: relative;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .ai-brain::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #feca57, #ff9a56, #ff6b6b);
            border-radius: 34px;
            z-index: 1;
            animation: rotateGlow 2.5s linear infinite;
            filter: blur(10px);
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-title {
            background: linear-gradient(135deg, #ffffff, #e0e7ff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            letter-spacing: -0.03em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .logo-subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.15rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* ✨ ENHANCED FORM STYLES */
        .form-group {
            position: relative;
            margin-bottom: 0;
        }

        .input-label {
            position: absolute;
            top: 1.1rem;
            left: 1.5rem;
            color: rgba(148, 163, 184, 0.8);
            font-weight: 500;
            font-size: 0.95rem;
            background: linear-gradient(135deg, rgba(15,15,25,0.95), rgba(51,65,85,0.95));
            padding: 0 0.75rem;
            border-radius: 8px;
            z-index: 3;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .clean-input {
            background: rgba(20, 20, 35, 0.8);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 1.6rem 1.5rem 0.6rem 1.5rem;
            font-size: 1.05rem;
            font-weight: 500;
            color: #f8fafc !important;
            height: 70px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            outline: none !important;
            backdrop-filter: blur(10px);
        }

        .clean-input::placeholder {
            color: transparent !important;
            opacity: 0 !important;
        }

        .clean-input:focus {
            border-color: rgba(59, 130, 246, 0.7);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 0 0 4px rgba(59, 130, 246, 0.25),
                0 8px 25px rgba(59, 130, 246, 0.15);
            transform: translateY(-3px);
            color: #f8fafc !important;
        }

        .form-group:focus-within .input-label,
        .clean-input:not(:placeholder-shown) ~ .input-label {
            top: 0.4rem;
            font-size: 0.82rem;
            color: #60a5fa !important;
            background: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(96,165,250,0.95)) !important;
            transform: translateY(-1px);
        }

        .magic-login-btn {
            background: linear-gradient(135deg, #4f46e5, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 24px;
            padding: 1.5rem 2.5rem;
            font-size: 1.18rem;
            font-weight: 700;
            width: 100%;
            color: white;
            position: relative;
            overflow: hidden;
            height: 70px;
            margin-top: 0.75rem;
            box-shadow: 
                0 15px 40px rgba(79, 70, 229, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .magic-login-btn:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 
                0 35px 70px rgba(59, 130, 246, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .magic-login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: left 0.7s;
        }

        .magic-login-btn:hover::before {
            left: 100%;
        }

        .error-alert {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            padding: 1.1rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.4);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .create-account {
            text-align: center;
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        .create-account-link {
            color: rgba(96, 165, 250, 0.9);
            font-weight: 600;
            font-size: 1.08rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.15);
        }

        .create-account-link:hover {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
            text-shadow: 0 0 25px rgba(96, 165, 250, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        /* Responsive */
        @media (max-width: 576px) {
            .main-container {
                padding: 1.5rem 1.5rem 10rem 1.5rem;
            }
            .login-card { 
                margin: 0; 
                padding: 2.5rem 2rem 2rem 2rem;
                height: 560px;
                border-radius: 24px;
            }
            .logo-title { font-size: 2.3rem; }
            .logo-section { margin-bottom: 2rem; }
            .ai-brain { width: 100px; height: 100px; }
            .ai-brain i { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <!-- Premium cooking video background -->
    <div class="cooking-bg">
        <video autoplay muted loop playsinline>
            <source src="{{ url_for('static', filename='video/cooking.mp4') }}" type="video/mp4">
        </video>
    </div>

    <div class="bg-overlay"></div>

    <!-- Enhanced floating ingredients -->
    <div class="floating-ingredients float1"><i class="fas fa-carrot"></i></div>
    <div class="floating-ingredients float2"><i class="fas fa-lemon"></i></div>
    <div class="floating-ingredients float3"><i class="fas fa-pepper-hot"></i></div>
    <div class="floating-ingredients float4"><i class="fas fa-tomato"></i></div>

    <div class="main-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="ai-brain">
                    <i class="fas fa-brain"></i>
                </div>
                <h1 class="logo-title">AlgoChef</h1>
                <p class="logo-subtitle">Your AI Cooking Companion</p>
            </div>

            {% if error %}
            <div class="alert alert-danger error-alert">
                <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
            </div>
            {% endif %}

            <div class="form-container">
                <form method="POST" id="loginForm">
                    <div class="form-group">
                        <label for="username" class="input-label">
                            <i class="fas fa-user-circle me-2"></i>Username
                        </label>
                        <input type="text" class="form-control clean-input" id="username" name="username" 
                               value="{{ request.form.username if request.form else '' }}" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="input-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input type="password" class="form-control clean-input" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn magic-login-btn" id="loginBtn">
                        <i class="fas fa-magic me-2"></i>Enter Kitchen
                    </button>
                </form>

                <div class="create-account">
                    <a href="/register" class="create-account-link">
                        <i class="fas fa-user-plus"></i>
                        Create New Account
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Premium loading animation
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>AI Processing...';
            btn.style.transform = 'none';
        });

        // Auto-focus
        document.getElementById('username').focus();

        // Enter key on password → submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('loginForm').submit();
        });

        // ✨ Enhanced input animations
        document.querySelectorAll('.clean-input').forEach(input => {
            input.addEventListener('input', function() {
                this.parentElement.classList.toggle('has-value', this.value.length > 0);
            });
        });
    </script>
</body>
</html>
