<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoChef AI - Chat with Chef</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255,255,255,0.1);
            --glass-border: rgba(255,255,255,0.2);
            --ai-blue: linear-gradient(135deg, #667eea, #764ba2);
            --success-green: linear-gradient(135deg, #11998e, #38ef7d);
        }

        * { font-family: 'Segoe UI', sans-serif; }
        body {
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            position: relative;
        }

        /* Cooking Video Background */
        .cooking-bg {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .cooking-bg video { width: 100vw; height: 100vh; object-fit: cover; }
        .bg-overlay {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(10,10,10,0.6), rgba(26,26,44,0.7));
            z-index: 2;
        }

        /* Floating Ingredients */
        .floating-ing {
            pointer-events: none;
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.08;
            z-index: 3;
            animation: floatFood 25s infinite linear;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }
        .float1 { top: 15%; left: 10%; animation-delay: 0s; }
        .float2 { top: 25%; right: 12%; animation-delay: 6s; }
        .float3 { bottom: 25%; left: 8%; animation-delay: 12s; }
        .float4 { top: 60%; right: 15%; animation-delay: 18s; }
        @keyframes floatFood {
            0%,100%{transform:translateY(0)rotate(0deg);opacity:.08}
            25%{transform:translateY(-30px)rotate(90deg)scale(1.1);opacity:.12}
            50%{transform:translateY(-60px)rotate(180deg)scale(1.2);opacity:.15}
            75%{transform:translateY(-30px)rotate(270deg)scale(1.1);opacity:.12}
        }

        /* Main Chat Container */
        .chat-container {
            position: relative;
            z-index: 9999;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem 2rem 1rem;
        }

        .chat-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .ai-avatar {
            width: 80px; height: 80px;
            background: var(--ai-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            position: relative;
            box-shadow: 0 15px 30px rgba(102,126,234,0.4);
        }
        .ai-avatar i { font-size: 2.5rem; color: white; }
        .ai-avatar::after {
            content: ''; position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: conic-gradient(#ff6b6b, #4ecdc4, #45b7d1, #feca57, #ff6b6b);
            border-radius: 50%; z-index: 1; animation: rotateGlow 3s linear infinite;
            filter: blur(8px);
        }
        @keyframes rotateGlow { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }

        .chat-title {
            background: linear-gradient(135deg, #ffffff, #e0e7ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2.2rem; font-weight: 800; margin: 0;
        }
        .chat-subtitle { color: rgba(255,255,255,0.8); margin: 0; font-size: 1.1rem; }

        /* Messages Area */
        .messages-area {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
        }
        .message {
            margin-bottom: 1.5rem;
            opacity: 0; transform: translateY(20px);
            animation: slideIn 0.4s ease forwards;
        }
        @keyframes slideIn { to{opacity:1;transform:translateY(0)} }
        .message.user { text-align: right; }
        .message.ai { text-align: left; }
        .message-bubble {
            max-width: 75%;
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }
        .user .message-bubble {
            background: var(--success-green); color: white;
            border-bottom-right-radius: 5px; margin-left: auto;
            box-shadow: 0 10px 25px rgba(17,153,142,0.4);
        }
        .ai .message-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom-left-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .message-time { font-size: 0.8rem; opacity: 0.7; margin-top: 0.3rem; }

        /* Typing Indicator */
        .typing-indicator {
            display: none; padding: 1rem 1.5rem;
        }
        .typing-dots { display: flex; gap: 0.3rem; }
        .typing-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.5); animation: typing 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%,60%,100%{transform:scale(1);opacity:.5}
            30%{transform:scale(1.3);opacity:1}
        }

        /* Input Area */
        /* FIX: Input Area - Higher z-index */
.input-area {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 25px;
    padding: 1.5rem 2rem;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    position: relative; /* ADD THIS */
    z-index: 20; /* ADD THIS - Higher than everything */
}

/* FIX: Chat Input - Force focusable */
.chat-input {
    background: rgba(30,30,50,0.9) !important; /* More opaque */
    border: 2px solid rgba(255,255,255,0.4) !important;
    border-radius: 25px;
    padding: 1.2rem 1.8rem !important;
    color: #ffffff !important;
    font-size: 1.1rem !important;
    backdrop-filter: blur(15px) !important;
    outline: none !important;
    cursor: text !important; /* ADD THIS */
    z-index: 10000 !important; /* ADD THIS */
    position: relative !important;
}

.chat-input::placeholder { 
    color: rgba(255,255,255,0.7) !important; 
    opacity: 1 !important;
}

.chat-input:focus {
    border-color: #60a5fa !important;
    box-shadow: 0 0 0 4px rgba(96,165,250,0.3) !important;
    background: rgba(40,40,60,0.95) !important;
    color: #ffffff !important;
    transform: none !important; /* Remove transform */
}

/* FIX: Send Button */
.send-btn {
    background: var(--success-green) !important;
    border: none !important;
    border-radius: 50% !important;
    width: 60px !important; 
    height: 60px !important;
    z-index: 25 !important;
    position: relative !important;
}
        /* Responsive */
        @media (max-width: 768px) {
            .chat-container { padding: 1rem; }
            .chat-header { padding: 1rem; margin-bottom: 1rem; }
            .chat-title { font-size: 1.8rem; }
            .messages-area, .input-area { border-radius: 20px; padding: 1.5rem; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <!-- Premium Cooking Background -->
    <div class="cooking-bg">
        <video autoplay muted loop playsinline>
            <source src="{{ url_for('static', filename='video/cooking.mp4') }}" type="video/mp4">
        </video>
    </div>
    <div class="bg-overlay"></div>

    <!-- Floating Ingredients -->
    <div class="floating-ing float1"><i class="fas fa-carrot"></i></div>
    <div class="floating-ing float2"><i class="fas fa-lemon"></i></div>
    <div class="floating-ing float3"><i class="fas fa-pepper-hot"></i></div>
    <div class="floating-ing float4"><i class="fas fa-tomato"></i></div>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="ai-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <h1 class="chat-title">AlgoChef AI</h1>
            <p class="chat-subtitle">Ask me anything about recipes! 🍳</p>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messagesArea">
            <div class="message ai">
                <div class="message-bubble">
                    <strong>🤖 AlgoChef AI:</strong> Hi Chef! 👋<br>
                    Ask me for recipes, meal plans, substitutions, or nutrition info!<br>
                    <em>Try: "Quick chicken dinner under 400 calories"</em>
                </div>
                <div class="message-time">Just now</div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="message ai typing-indicator" id="typingIndicator">
            <div class="message-bubble">
                <strong>AlgoChef AI</strong> is typing...
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-group">
                <input type="text" class="form-control chat-input" 
                       id="messageInput" placeholder="What would you like to cook today? 🍲"
                       autocomplete="off">
                <button class="btn send-btn text-white ms-2" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="mt-2 text-center">
                <small class="text-white-50">
                    <a href="/" class="text-white-50 text-decoration-none me-3">🏠 Home</a>
                    <a href="/cookbook" class="text-white-50 text-decoration-none">❤️ Cookbook</a>
                </small>
            </div>
        </div>
    </div>

    <script>
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Send message
        function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    alert(text); // 👈 ADD THIS LINE


            // Add user message
            addMessage(text, 'user');
            messageInput.value = '';

            // Show typing
            typingIndicator.style.display = 'block';
            messagesArea.scrollTop = messagesArea.scrollHeight;

            // Send to backend
            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            })
            .then(r => r.json())
            .then(data => {
                typingIndicator.style.display = 'none';
                addMessage(data.response, 'ai');
            })
            .catch(() => {
                typingIndicator.style.display = 'none';
                addMessage("Sorry, I'm having trouble connecting. Try again! 😅", 'ai');
            });
        }

        // Add message to chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">${text.replace(/\n/g, '<br>')}</div>
                <div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            `;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            // Animate in
            setTimeout(() => messageDiv.style.animation = 'slideIn 0.4s ease forwards', 50);
        }

        // Event listeners
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault(); // prevents weird behavior
        sendMessage();
    }
});        messageInput.focus();

        // Auto-resize input
        messageInput.oninput = () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        };
    </script>
</body>
</html>
