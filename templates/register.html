<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-custom {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.4);
        }
        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
        .login-link {
            color: #28a745;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link:hover {
            color: #20c997;
            text-decoration: underline;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="register-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
                        <h2 class="fw-bold text-dark mb-1">Create Account</h2>
                        <p class="text-muted">Join our recipe community!</p>
                    </div>

                    <form method="POST" novalidate>
                        <!-- Username Field -->
                        <div class="mb-4">
                            <label for="username" class="form-label fw-semibold text-dark">
                                <i class="fas fa-user me-2 text-success"></i>Username
                            </label>
                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="username"
                                name="username" 
                                placeholder="Enter your username"
                                required
                                minlength="3"
                                maxlength="20"
                            >
                            <div class="form-text">Minimum 3 characters</div>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold text-dark">
                                <i class="fas fa-lock me-2 text-success"></i>Password
                            </label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg" 
                                id="password"
                                name="password" 
                                placeholder="Create a strong password"
                                required
                                minlength="6"
                            >
                            <div class="form-text">Minimum 6 characters</div>
                        </div>

                        <!-- Register Button -->
                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-custom btn-lg">
                                <i class="fas fa-user-plus me-2"></i>
                                Register Now
                            </button>
                        </div>

                        <!-- Login Link -->
                        <div class="text-center">
                            <p class="mb-0 text-muted">
                                Already have an account? 
                                <a href="{{ url_for('login') }}" class="login-link">
                                    <i class="fas fa-sign-in-alt me-1"></i>Login here
                                </a>
                            </p>
                        </div>
                    </form>
                </div>

                <!-- Success/Error Messages -->
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="row mt-3 justify-content-center">
                            <div class="col-md-6">
                                {% for message in messages %}
                                    <div class="alert alert-{{ 'success' if 'success' in message.lower() else 'danger' }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            </div>
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation feedback
        document.querySelector('form').addEventListener('submit', function(e) {
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            
            if (username.value.length < 3) {
                e.preventDefault();
                username.classList.add('is-invalid');
                return false;
            }
            
            if (password.value.length < 6) {
                e.preventDefault();
                password.classList.add('is-invalid');
                return false;
            }
        });

        // Remove invalid class on input
        document.getElementById('username').addEventListener('input', function() {
            this.classList.remove('is-invalid');
        });
        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('is-invalid');
        });
    </script>
</body>
</html>
