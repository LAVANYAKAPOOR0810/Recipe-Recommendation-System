<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ recipe.recipe_name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
        }

        .container-box {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .recipe-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .recipe-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .section-title {
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #11998e;
        }

        .ingredients-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
        }

        .instructions-box {
            background: #f1fdf8;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.6;
        }

        .btn-back {
            border-radius: 10px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<div class="container-box">

    <a href="/" class="btn btn-outline-dark btn-back mb-3">⬅ Back</a>

    <h1 class="recipe-title">{{ recipe.recipe_name }}</h1>

    <img src="{{ recipe.image_url }}" 
         class="recipe-img"
         onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836'">

    <h4 class="section-title">🧾 Ingredients</h4>
    <div class="ingredients-box">
        {{ recipe.ingredients_list }}
    </div>

    <h4 class="section-title">👨‍🍳 Instructions</h4>
    <div class="instructions-box">
        {{ instructions }}
    </div>

</div>

</body>
</html>
